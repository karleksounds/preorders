<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Vinyl Releases Archive</title>
    <link rel="icon" href="images/ico-7.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/styles.min.css">
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Vinyl Releases <span style="font-weight:400;font-size:1.6rem;">Archive</span></h1>
        <p class="last-update" id="last-update">Last update: Loading...</p>
      </header>

      <aside id="loading">Loading records...</aside>
      <aside id="error" style="display: none;"></aside>

      <nav class="format-toggle" id="format-toggle" style="display: none;">
        <button class="format-btn active" onclick="changeFormat('7&quot;')">7"</button>
        <button class="format-btn" onclick="changeFormat('LP')">LP</button>
      </nav>

      <div class="search-bar" id="search-bar" style="display: none;">
        <input type="search" id="search-input" placeholder="Search artist, title, label..." oninput="handleSearch(this.value)">
      </div>

      <nav class="pagination" id="pagination" style="display: none;">
        <!-- Pagination will be inserted here by JavaScript -->
      </nav>

      <main id="records-container">
        <!-- Records will be inserted here by JavaScript -->
      </main>
    </div>

    <script>
      window.ARCHIVE_MODE = true;
    </script>
    <script src="scripts/main.js"></script>
  </body>
</html>
